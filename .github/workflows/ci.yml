name: CI — Typecheck + Build + Playwright

# Déclenché sur : push vers main, PR vers main, manuel (workflow_dispatch)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel auto les runs redondants sur la même branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── JOB 1 : Typecheck + Build (rapide, ne lance pas le serveur) ─
  build:
    name: Typecheck + Vite build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build (Vite)
        run: npm run build
        env:
          # CI: pas d'env Stripe/Sentry — skip silencieusement
          SENTRY_DSN: ''
          STRIPE_SECRET_KEY: ''

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: ignore

  # ─── JOB 2 : Playwright E2E (lance serveur Node + tests navigateur) ─
  e2e:
    name: Playwright E2E (chromium)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Install server deps
        working-directory: server
        run: npm ci --no-audit --no-fund

      - name: Run Playwright tests
        env:
          # CI: secret factice 32+ chars (utilisé par tests horoscope fallback)
          JWT_SECRET: ci-fallback-secret-min-32-chars-for-tests-only
          NODE_ENV: test
          SKIP_WEBSERVER: '1'   # Playwright gère lui-même le serveur via webServer dans config
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ─── JOB 3 : Lint (oxlint, rapide) ─
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run oxlint
        run: npm run lint --if-present

  # ─── STATUS GLOBAL ─
  # Tous les jobs doivent passer pour ✅ vert. Si un seul ❌ rouge → bloquant.
