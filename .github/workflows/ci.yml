name: CI — Typecheck + Build + Playwright

# Déclenché sur : push vers main, PR vers main, manuel (workflow_dispatch)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel auto les runs redondants sur la même branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── JOB 1 : Typecheck + Build (rapide, ne lance pas le serveur) ─
  build:
    name: Typecheck + Vite build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build (Vite)
        run: npm run build
        env:
          # CI: pas d'env Stripe/Sentry — skip silencieusement
          SENTRY_DSN: ''
          STRIPE_SECRET_KEY: ''

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: ignore

  # ─── JOB 2 : Playwright E2E (lance serveur Node + tests navigateur) ─
  e2e:
    name: Playwright E2E (chromium)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Install server deps
        working-directory: server
        run: npm ci --no-audit --no-fund

      - name: Run backend server (background) for API tests
        working-directory: server
        env:
          JWT_SECRET: ci-fallback-secret-min-32-chars-for-tests-only
          NODE_ENV: test
          PORT: '3001'
        run: |
          # Start backend in background, wait for it to be reachable
          nohup node server.js > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend started with PID $BACKEND_PID"
          # Wait up to 30s for backend to be ready
          for i in {1..30}; do
            if curl -s http://localhost:3001/api/health > /dev/null 2>&1 || curl -s http://localhost:3001/ > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Show backend logs in case of failure
          tail -20 /tmp/backend.log || true

      - name: Run Playwright tests
        env:
          # CI: secret factice 32+ chars (utilisé par tests horoscope fallback)
          JWT_SECRET: ci-fallback-secret-min-32-chars-for-tests-only
          NODE_ENV: test
          BASE_URL: 'http://localhost:5173'
          API_BASE_URL: 'http://localhost:3001'
        run: npx playwright test

      - name: Stop backend
        if: always()
        run: pkill -f "node server.js" || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ─── JOB 3 : Backend unit tests (0 dépendance, < 1s) ────────────────
  test:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: node server/test-unit.mjs

  # ─── JOB 4 : Lint (oxlint, rapide) ─
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run oxlint
        run: npm run lint --if-present

  # ─── STATUS GLOBAL ─
  # Tous les jobs doivent passer pour ✅ vert. Si un seul ❌ rouge → bloquant.
