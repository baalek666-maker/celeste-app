name: Deploy (production)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deploys
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    needs: []
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - name: Trigger deploy hook
        run: |
          if [ -z "${{ secrets.DEPLOY_HOOK_URL }}" ]; then
            echo "No DEPLOY_HOOK_URL secret set — skipping auto-deploy."
            exit 0
          fi
          curl -X POST "${{ secrets.DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}' \
            --fail-with-body